{% extends "base.html" %}

{% block content %}
<div class="blog-container">
  <div class="post-container">
    <h1 class="title blog-title">
      {{ page.title }}
    </h1>
    <p class="subtitle"><strong>{{ page.date }}</strong></p>
    {{ page.content | safe }}
  </div>
</div>
{% endblock content %}
